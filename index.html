<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTU Result</title>

<style>
body { font-family: Arial; background:#f5f5f5; }

.header {
  background:#002147;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.box {
  background:white;
  margin:80px auto;
  padding:25px;
  max-width:320px;
  border-radius:10px;
  text-align:center;
}

input, button {
  width:100%;
  padding:10px;
  margin:10px 0;
}

button {
  background:#002147;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="header">Gujarat Technological University</div>

<div class="box">
  <h3>Result Query</h3>
  <input id="enroll" placeholder="Enrollment Number">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Search</button>
  <p id="error" style="color:red;"></p>
</div>

<script>
function login(){
  let e = document.getElementById("enroll").value;
  let p = document.getElementById("pass").value;

  if(e==="230470116076" && p==="420567"){
    window.location.href="loading.html";
  } else {
    document.getElementById("error").innerText="Invalid Details";
  }
}
</script>

</body>
</html>
